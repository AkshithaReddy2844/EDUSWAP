<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Learning Experts</title>

<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
.container {
    max-width:800px; margin:auto; background:white;
    padding:20px; border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
h2 { text-align:center; margin-bottom:20px; }
.user {
    padding:15px; margin-bottom:15px;
    border:1px solid #ddd; border-radius:8px;
    background:#fafafa;
}
.user a {
    display:inline-block; margin-top:8px;
    text-decoration:none; color:white;
    background:#0077B5; padding:6px 12px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>MACHINE LEARNING REGISTERED EXPERTS</h2>
    <div id="userDetails">Loading...</div>
</div>

<script type="module">

import { auth } from "./firebase.js";
import { getFirestore, collection, query, where, getDocs }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

// reuse Firebase app
const app = getApp();
const db = getFirestore(app);

const container = document.getElementById("userDetails");

async function loadUsers() {
    const q = query(
        collection(db, "skills"),
        where("course", "==", "Machine Learning")
    );

    const snapshot = await getDocs(q);

    if (snapshot.empty) {
        container.innerHTML = "<p>No Machine Learning experts registered yet.</p>";
        return;
    }

    container.innerHTML = "";

    snapshot.forEach(doc => {
        const data = doc.data();

        container.innerHTML += `
            <div class="user">
                <h3>${data.name}</h3>
                <p>${data.description || ""}</p>
                ${data.social ? `<a href="${data.social}" target="_blank">View Profile</a>` : ""}
            </div>`;
    });
}

loadUsers();

</script>
</body>
</html>

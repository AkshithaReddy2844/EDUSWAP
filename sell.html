<!DOCTYPE html>
<html lang="en">
<head>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            background-image: url('images1/sellproducts.png');
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        table {
            width: 60%;
            max-width: 600px;
            border-collapse: collapse;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        input {
            width: 100%;
            padding: 6px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<form id="sellForm">
    <table>
        <tr>
            <th colspan="2">Sell an Item</th>
        </tr>
        <tr>
            <td>Product Name:</td>
            <td><input type="text" id="productName" required></td>
        </tr>
        <tr>
            <td>Contact:</td>
            <td><input type="text" id="contact" required></td>
        </tr>
        <tr>
            <td>Email:</td>
            <td><input type="email" id="email" required></td>
        </tr>
        <tr>
            <td>Brand:</td>
            <td><input type="text" id="brand" required></td>
        </tr>
        <tr>
            <td>Product Code:</td>
            <td><input type="text" id="productCode" required></td>
        </tr>
        <tr>
            <td>Condition:</td>
            <td><input type="text" id="condition" required></td>
        </tr>
        <tr>
            <td>Location:</td>
            <td><input type="text" id="location" required></td>
        </tr>
        <tr>
            <td>Price:</td>
            <td><input type="text" id="price" required></td>
        </tr>
        <tr>
            <td>Social Media Links:</td>
            <td>
                <input type="url" id="facebook" placeholder="Facebook URL">
                <input type="url" id="instagram" placeholder="Instagram URL">
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <button type="submit">Sell</button>
            </td>
        </tr>
    </table>
</form>

<script type="module">

import { auth } from "./firebase.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

// reuse existing Firebase app
const app = getApp();
const db = getFirestore(app);

document.getElementById("sellForm").addEventListener("submit", async (event) => {
    event.preventDefault();

    const productName = document.getElementById("productName").value.trim();
    const contact = document.getElementById("contact").value.trim();
    const email = document.getElementById("email").value.trim();
    const brand = document.getElementById("brand").value.trim();
    const productCode = document.getElementById("productCode").value.trim();
    const condition = document.getElementById("condition").value.trim();
    const location = document.getElementById("location").value.trim();
    const price = document.getElementById("price").value.trim();
    const facebook = document.getElementById("facebook").value.trim();
    const instagram = document.getElementById("instagram").value.trim();

    try {
        await addDoc(collection(db, "sales"), {
            productName,
            contact,
            email,
            brand,
            productCode,
            condition,
            location,
            price,
            facebook,
            instagram,
            createdAt: new Date(),
            userId: auth.currentUser ? auth.currentUser.uid : null
        });

        alert("Item listed for sale successfully!");
        window.location.href = "shop.html";

    } catch (error) {
        alert("Error: " + error.message);
    }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body{
    font-family: Inter, system-ui, sans-serif;
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(145deg,#84cfef,#88d4eb);
}

.register-box{
    width:420px;
    padding:40px;
    text-align:center;
    font-size:20px;
    border-radius:24px;
    background:rgba(255,255,255,.92);
    box-shadow:0 20px 60px rgba(0,0,0,.12);
}

input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:12px;
    Font-size:20px;
    border:1px solid #ddd;
    background:#f4f7ff;
}

input:focus{
    outline:none;
    border-color:#4b7bff;
}

button{
    width:100%;
    padding:14px;
    font-size:16px; 
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#4b7bff;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.error{color:red; min-height:20px;}
.success{color:green; min-height:20px;}

a{color:#3367d6; text-decoration:none; font-weight:bold;}
</style>
</head>

<body>

<div class="register-box">
    <h2>Create Account</h2>
    <p>Join EduSwap</p>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>

    <form onsubmit="event.preventDefault(); registerUser();">
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button>Create Account</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { setDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.registerUser = async () => {
    const username = username.value.trim();
    const email = email.value.trim();
    const password = password.value.trim();

    error.innerText = success.innerText = "";

    try {
        const user = await createUserWithEmailAndPassword(auth, email, password);

        await setDoc(doc(db, "users", user.user.uid), {
            username, email, createdAt: new Date()
        });

        success.innerText = "Success! Redirecting...";
        setTimeout(() => location.href = "login.html", 1500);

    } catch (e) {
        error.innerText = e.message;
    }
}
</script>

</body>
</html>

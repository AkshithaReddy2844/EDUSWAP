<!DOCTYPE html>
<html lang="en">
<head>
   
    <style>
html, body {
    height: 100%;
    margin: 0;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #ecd09d, #94dbef);
}

.container{
    width: 550px;
    padding: 50px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    text-align: center;
}

.container h1 {
    color: black;
    font-size: 36px;
    margin-bottom: 15px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
}

.container p {
    color:black;
    font-size: 28px;
    margin-bottom: 25px;
    line-height: 1.6;
}

.btn {
    font-size: 24px;
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin: 8px;
}

.btn.registration {
    background: #4a90e2;
    color: white;
}

.btn.connect {
    background: #2ecc71;
    color: white;
}
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to Student Connect</h1>
        <p>Join the network or find influential students!</p>
        
        <!-- Both buttons with their respective color-changing animations -->
        <button class="btn registration" onclick="location.href='registration.html'">Registration</button>
        <button class="btn connect" onclick="location.href='connect.html'">Connect</button>
    </div>
<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
    }
});
</script>
</body>
</html>

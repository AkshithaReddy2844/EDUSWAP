<!DOCTYPE html>
<html lang="en">
<head>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff; /* Light blue background */
        }
        h1 {
            margin-top: 50px;
            color: #333;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }
        .box {
            width: 250px;
            height: 350px; /* Set a fixed height to ensure uniformity */
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            text-align: center;
            background-color: #f9f9f9;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* Ensure the image doesn't overflow the box */
        }
        .box img {
            width: 100%;
            height: 200px; /* Ensure the image fills the box with a fixed height */
            object-fit: cover; /* Ensures the image covers the entire area without distorting */
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .box a {
            text-decoration: none;
            font-weight: bold;
            color: #007bff;
            font-size: 16px;
        }
        .box h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Welcome to Skills Hub</h1>

            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQaP_-edKNKifLhMDl3EZPCfu5WFsyeYLXV2pVnMZwDQA&s=10" alt="Share Skill Image">
            <h3>Share a Skill</h3>

            <h3>Sell a Skill</h3>
            <a href="sell_skill.html">Click Here</a>
        </div>
        <div class="box">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ4UW-mJl80NzInnozy5VBKDR4W_okxggOzsT3t9qdbOg&s=10" alt="Get Skill Image">
            <h3>Get a Skill</h3>
            <a href="purchase_skill.html">Click Here</a>

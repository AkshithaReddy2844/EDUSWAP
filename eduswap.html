<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('IMAGES/login.jpg') no-repeat center center/cover; /* Background image */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* Overlay effect for readability */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(82, 183, 136, 0.8); /* #52b788 with 80% opacity */
            z-index: -1;
        }

        .welcome-message {
            font-size: 40px;
            color: black;
            margin-bottom: 30px;
            text-align: center;
        }

        .login-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #001f4d;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .login-btn {
            width: 48%;
            padding: 12px;
            background-color: #4CAF50;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
        }

        .login-btn:hover {
            background-color: #168aad;
        }

        .forgot-password {
            display: block;
            margin-top: 10px;
            font-size: 14px;
            color: #007BFF;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .new-to-eduswap {
            font-size: 14px;
            color: #333;
            margin-top: 20px;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background-color: #52b69a;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .signup-btn:hover {
            background-color: #e14e2a;
        }
    </style>
</head>
<body>

    <div class="welcome-message">
        Welcome to EduSwap
    </div>

    <div class="login-box">
        <h2>Login</h2>
        <form onsubmit="login(event)">
            <input type="text" id="login-username" class="input-field" placeholder="Username" required><br>
            <input type="password" id="login-password" class="input-field" placeholder="Password" required><br>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <a href="#" class="forgot-password">Forgot password?</a>

        <div class="new-to-eduswap">
            New to EduSwap?
        </div>

        <button class="signup-btn" onclick="window.location.href='signup.html'">Sign Up</button>
    </div>

    <script>
        function login(event) {
            event.preventDefault(); // Prevent form from reloading

            let enteredUsername = document.getElementById("login-username").value.trim();
            let enteredPassword = document.getElementById("login-password").value.trim();

            let storedUsername = localStorage.getItem("username");
            let storedPassword = localStorage.getItem("password");

            if (!storedUsername || !storedPassword) {
                alert("No account found. Please sign up first.");
                return;
            }

            if (enteredUsername === storedUsername && enteredPassword === storedPassword) {
                alert("Login successful!");
                window.location.href = "options.html"; // Redirect to options page
            } else {
                alert("Invalid username or password.");
            }
        }
    </script>

</body>
</html>

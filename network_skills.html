<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Your Skill</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#b5cfe4;
    text-align:center;
    padding:30px;
}

h1{
    color:#0A2947;
    margin-bottom:20px;
}

#searchBar{
    width:60%;
    padding:14px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    margin-bottom:40px;
}

/* Slider */

.slider-container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-top:50px;
}

.slide{
    width:1000px;
    min-height:450px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    display:flex;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.slide img{
    width:500px;
    height:450px;
    object-fit:cover;
}

.content{
    flex:1;
    padding:40px;
    text-align:left;
}

.content h2{
    color:#0A2947;
    font-size:36px;
    margin-bottom:20px;
}

.content p{
    font-size:20px;
    line-height:1.8;
    color:#555;
}

.view-btn{
    margin-top:25px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#0077b6;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.view-btn:hover{
    background:#023e8a;
}

.nav-btn{
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    background:white;
    font-size:30px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.nav-btn:hover{
    background:#f1f1f1;
}

@media(max-width:900px){

.slide{
    flex-direction:column;
    width:95%;
}

.slide img{
    width:100%;
    height:250px;
}

#searchBar{
    width:90%;
}

}

</style>
</head>

<body>

<h1>Search Your Skill</h1>

<input
type="text"
id="searchBar"
placeholder="Search Skills...">

<div class="slider-container">

<button id="prevBtn" class="nav-btn">
&#10094;
</button>

<div class="slide">

<img id="courseImage" src="IMAGES/ai.jpg">

<div class="content">

<h2 id="courseTitle">
Artificial Intelligence
</h2>

<p id="courseDesc">
Learn Artificial Intelligence and build intelligent systems.
</p>

<a id="courseLink" href="ai.html">
<button class="view-btn">
View Course
</button>
</a>

</div>

</div>

<button id="nextBtn" class="nav-btn">
&#10095;
</button>

</div>

<script type="module">

import { auth } from "./firebase.js";
import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// Protect Page

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="login.html";
}

});

// Courses

const courses = [

{
title:"Artificial Intelligence",
image:"IMAGES/ai.jpg",
link:"ai.html",
desc:"Learn Artificial Intelligence and build intelligent systems."
},

{
title:"DBMS",
image:"IMAGES/dbms.png",
link:"dbms.html",
desc:"Learn Database Management Systems and improve data handling."
},

{
title:"Software Engineering",
image:"IMAGES/sw.jpg",
link:"software.html",
desc:"Master software development methodologies and project management."
},

{
title:"System Analysis",
image:"IMAGES/system_analysis.jpg",
link:"system_analysis.html",
desc:"Understand system requirements and design techniques."
},

{
title:"Web Design",
image:"IMAGES/web_design.jpg",
link:"web_design.html",
desc:"Learn HTML, CSS and modern web designing."
},

{
title:"UI / UX",
image:"IMAGES/ui_ux.jpg",
link:"ui_ux.html",
desc:"Create user-friendly and visually attractive interfaces."
},

{
title:"Machine Learning",
image:"IMAGES/ml.jpg",
link:"machine_learning.html",
desc:"Build intelligent applications using machine learning."
},

{
title:"Other",
image:"IMAGES/others.png",
link:"other.html",
desc:"Explore additional skills and technologies."
}

];

let current = 0;

function loadCourse(){

document.getElementById("courseTitle").innerText =
courses[current].title;

document.getElementById("courseImage").src =
courses[current].image;

document.getElementById("courseDesc").innerText =
courses[current].desc;

document.getElementById("courseLink").href =
courses[current].link;

}

document.getElementById("nextBtn").onclick = () => {

current++;

if(current >= courses.length){
current = 0;
}

loadCourse();

};

document.getElementById("prevBtn").onclick = () => {

current--;

if(current < 0){
current = courses.length - 1;
}

loadCourse();

};

document.getElementById("searchBar")
.addEventListener("keyup",function(){

const value = this.value.toLowerCase();

const index = courses.findIndex(course =>
course.title.toLowerCase().includes(value));

if(index !== -1){

current = index;

loadCourse();

}

});

loadCourse();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
   
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            font-size: 20px;
            background-color: #f5f5f5;
            background-image: url('IMAGES/collegenetworking.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            margin: 30px auto;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        }

        .user-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            background-color: #fff;
            box-shadow: 0px 0px 8px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        a {
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<h2>College Networking</h2>

<input type="text" id="searchBox" placeholder="Search by college name...">

<div class="container" id="userList">
    Loading...
</div>

<script type="module">

import { auth } from "./firebase.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

// reuse Firebase app
const app = getApp();
const db = getFirestore(app);

const userList = document.getElementById("userList");
const searchBox = document.getElementById("searchBox");

let allUsers = [];

async function loadCollegeUsers() {

    try {

        const snapshot = await getDocs(collection(db, "network_users"));

        if (snapshot.empty) {
            userList.innerHTML = "<p>No registered users yet.</p>";
            return;
        }

        allUsers = [];

        snapshot.forEach(doc => {
            allUsers.push(doc.data());
        });

        displayUsers(allUsers);

    } catch (error) {
        console.error(error);
        userList.innerHTML = "<p>Error loading data.</p>";
    }
}

function displayUsers(users) {

    userList.innerHTML = "";

    if (users.length === 0) {
        userList.innerHTML = "<p>No users found.</p>";
        return;
    }

    users.forEach(user => {

        userList.innerHTML += `
            <div class="user-card">
                <strong>Name:</strong> ${user.name} <br>
                <strong>College:</strong> ${user.college} <br>
                <strong>Location:</strong> ${user.collegeLocation} <br>
                ${user.socialLink ? `<br><a href="${user.socialLink}" target="_blank">Connect</a>` : ""}
            </div>
        `;
    });
}

// 🔎 Search by college name
searchBox.addEventListener("keyup", () => {

    const query = searchBox.value.toLowerCase();

    const filtered = allUsers.filter(user =>
        user.college &&
        user.college.toLowerCase().includes(query)
    );

    displayUsers(filtered);
});

loadCollegeUsers();

</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    background:linear-gradient(135deg,#a8edea,#fed6e3);
}

/* Main Container */
.container{
    width:100%;
    max-width:500px;
}

/* Heading */
.title{
    text-align:center;
    margin-bottom:20px;
}

.title h1{
    color:#1d3557;
    font-size:28px;
}

.title p{
    color:#555;
    margin-top:8px;
}

/* Donation Card */
.form-card{
    background:rgba(255,255,255,0.95);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* Header */
.form-header{
    background:linear-gradient(135deg,#4361ee,#3a0ca3);
    color:white;
    text-align:center;
    padding:25px;
}

.form-header h2{
    font-size:15px;
}

/* Form */
.form-body{
    padding:22px;
}

.form-group{
    margin-bottom:10px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}


input{
    width:100%;
    padding:8px 12px;
    border:2px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#4361ee;
    box-shadow:0 0 10px rgba(67,97,238,0.2);
}

/* Button */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#06d6a0,#1b9aaa);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* Responsive */
@media(max-width:768px){

    .title h1{
        font-size:30px;
    }

    .form-body{
        padding:20px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>🎓 EduSwap Donation Portal</h1>
        <p>Share educational resources and help fellow students.</p>
    </div>

    <div class="form-card">

        <div class="form-header">
            <h2>Donate an Educational Item</h2>
        </div>

        <div class="form-body">

            <form id="donateForm">

                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" required>
                </div>

                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="contact" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>Facebook Profile Link</label>
                    <input type="url" id="facebook">
                </div>

                <div class="form-group">
                    <label>Instagram Profile Link</label>
                    <input type="url" id="instagram">
                </div>

                <div class="form-group">
                    <label>Brand</label>
                    <input type="text" id="brand" required>
                </div>

                <div class="form-group">
                    <label>Product Code</label>
                    <input type="text" id="productCode" required>
                </div>

                <div class="form-group">
                    <label>Condition</label>
                    <input type="text" id="condition" required>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" required>
                </div>

                <button type="submit">
                    🎁 Donate Item
                </button>

            </form>

        </div>

    </div>

</div>

<script type="module">


import { auth, db } from "./firebase.js";
import {
    collection,
    addDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


document.getElementById("donateForm")
.addEventListener("submit", async (event) => {

    event.preventDefault();

    const productName =
    document.getElementById("productName").value.trim();

    const contact =
    document.getElementById("contact").value.trim();

    const email =
    document.getElementById("email").value.trim();

    const facebook =
    document.getElementById("facebook").value.trim();

    const instagram =
    document.getElementById("instagram").value.trim();

    const brand =
    document.getElementById("brand").value.trim();

    const productCode =
    document.getElementById("productCode").value.trim();

    const condition =
    document.getElementById("condition").value.trim();

    const location =
    document.getElementById("location").value.trim();

    try {
        await addDoc(collection(db, "donations"), {
            productName,
            contact,
            email,
            facebook,
            instagram,
            brand,
            productCode,
            condition,
            location,
            createdAt: new Date()
        });

        alert("Thank you for your donation! Your item has been listed.");

        document.getElementById("donateForm").reset();

    } catch (error) {
        console.error("Error adding document: ", error);
        alert("An error occurred while submitting your donation. Please try again.");
    }
});

</script>

</body>
</html>

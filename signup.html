<!DOCTYPE html>
<html lang="en">
<head>
   
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('IMAGES/login.jpg') no-repeat center center/cover; /* Background image */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* Overlay effect for readability */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(82, 183, 136, 0.8); /* #52b788 with 80% opacity */
            z-index: -1;
        }

        .signup-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #001f4d;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background-color: #52b69a;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .signup-btn:hover {
            background-color: #168aad;
        }

        .already-user {
            font-size: 14px;
            color: #333;
            margin-top: 20px;
        }

        .login-link {
            color: #007BFF;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="signup-box">
        <h2>Sign Up</h2>
        <form onsubmit="signUp(event)">
            <input type="text" id="signup-username" class="input-field" placeholder="Email" required><br>
            <input type="password" id="signup-password" class="input-field" placeholder="Password" required><br>
            <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <div class="already-user">
            Already have an account? <a href="login.html" class="login-link">Login</a>
        </div>
    </div>

    <script>
        // Function to validate the college email (should end with .ac.in)
        function isCollegeEmail(email) {
            const emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.ac\.in$/; // Updated to match .ac.in
            return emailPattern.test(email);
        }

        function signUp(event) {
            event.preventDefault(); // Prevent form reload

            let newUsername = document.getElementById("signup-username").value.trim();
            let newPassword = document.getElementById("signup-password").value.trim();

            if (newUsername === "" || newPassword === "") {
                alert("Please enter a username and password.");
                return;
            }

            // Check if the email is a valid college email

            // Store credentials in localStorage
            localStorage.setItem("username", newUsername);
            localStorage.setItem("password", newPassword);

            alert("Sign-up successful! Redirecting to login.");
            window.location.href = "eduswap.html"; // Redirect to login page
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ecd09d, #94dbef);
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            width: 600px;
            margin: 100px auto;
        }
        input, textarea {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 20px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 20px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Influencer Registration</h2>

    <form id="registrationForm">
        <input type="text" id="name" placeholder="Full Name" required><br>
        <input type="email" id="email" placeholder="Working Email" required><br>
        <input type="text" id="popularApp" placeholder="Popular On (Instagram / YouTube etc)" required><br>
        <input type="url" id="socialLink" placeholder="Social Media Profile Link" required><br>
        <textarea id="description" rows="3" placeholder="Brief Description"></textarea><br>

        <button type="submit">Register</button>
    </form>
</div>

<!-- Firebase Script -->
<script type="module">

import { auth } from "./firebase.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

// reuse existing Firebase app
const app = getApp();
const db = getFirestore(app);

const form = document.getElementById("registrationForm");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const popularApp = document.getElementById("popularApp").value.trim();
    const socialLink = document.getElementById("socialLink").value.trim();
    const description = document.getElementById("description").value.trim();

    try {
        await addDoc(collection(db, "influencers"), {
            name,
            email,
            popularApp,
            socialLink,
            description,
            createdAt: new Date(),
            userId: auth.currentUser ? auth.currentUser.uid : null
        });

        alert("Registration Successful!");
        window.location.href = "network_profile.html";

    } catch (error) {
        alert("Error: " + error.message);
    }
});

</script>

</body>
</html>

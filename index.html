<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSwap</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #52b788, #40916c);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            color: white;
            text-align: center;
        }

        .welcome {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            background-color: white;
            color: #2d6a4f;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #d8f3dc;
        }
    </style>
</head>
<body>

    <h1 class="welcome">Welcome to EduSwap</h1>
    <div class="subtitle">
        A Platform for Sharing, Helping, and Networking
    </div>

    <button class="btn" onclick="window.location.href='login.html'">
        Login
    </button>

    <button class="btn" onclick="window.location.href='register.html'">
        Register
    </button>
 
</body>
</html>
